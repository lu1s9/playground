<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dino Neck</title>
  <script defer src="https://analytics.lu1s9.dev/script.js" data-website-id="b43d0a09-e1eb-4a2e-ba0b-0c2025f98c3b"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage">
    <canvas id="game"></canvas>

    <div class="hud">
      <div id="score" class="score">0</div>
      <div id="combo" class="combo"></div>
    </div>

    <div id="overlay" class="overlay visible">
      <div class="card">
        <h1 id="overlay-title">Dino Neck</h1>
        <p id="overlay-text">Atrapa los fragmentos. Un fallo y se acabó.</p>
        <p class="controls">← → / A D · mouse · touch</p>
        <button id="overlay-button" type="button">Empezar</button>
      </div>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
